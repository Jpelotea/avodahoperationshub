name: Fix TEST UAT-03 Source Link Clear

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/fix-test-uat03-source-link-clear.trigger'

permissions:
  contents: write

concurrency:
  group: avodah-test-uat
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull live TEST source and patch cancellation source-link cleanup
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/Bookings.gs

          python - <<'PY'
          from pathlib import Path

          path = Path('src/Bookings.gs')
          text = path.read_text(encoding='utf-8')

          old_intake = """    updateObjectRow_('Intake Submissions', intake.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Last Processed At': new Date()
    });"""
          new_intake = """    updateObjectRow_('Intake Submissions', intake.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Booking ID': '',
      'Calendar Event ID': '',
      'Last Processed At': new Date()
    });"""

          old_lead = """    updateObjectRow_('Lead Database', lead.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Updated At': new Date(),
      'Updated By': bookingActorEmail_()
    });"""
          new_lead = """    updateObjectRow_('Lead Database', lead.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Booking ID': '',
      'Calendar Event ID': '',
      'Updated At': new Date(),
      'Updated By': bookingActorEmail_()
    });"""

          if old_intake not in text:
              raise SystemExit('Expected Intake cleanup block not found; refusing to patch.')
          if old_lead not in text:
              raise SystemExit('Expected Lead cleanup block not found; refusing to patch.')

          text = text.replace(old_intake, new_intake, 1).replace(old_lead, new_lead, 1)
          path.write_text(text, encoding='utf-8')
          PY

          grep -A15 -n '^function clearBookingSourceAppointment_' src/Bookings.gs > /tmp/clear-function.txt
          grep -q "'Booking ID': ''" /tmp/clear-function.txt
          test "$(grep -c "'Calendar Event ID': ''" /tmp/clear-function.txt)" -eq 2
          for f in src/*.gs; do node --check < "$f"; done

          clasp push --force >/dev/null

          rm -rf verify-src && mkdir -p verify-src
          cp .clasp.json /tmp/clasp-config.json
          python - <<'PY'
          import json
          p='/tmp/clasp-config.json'
          data=json.load(open(p))
          data['rootDir']='verify-src'
          open('.clasp.json','w').write(json.dumps(data))
          PY
          clasp pull >/dev/null
          grep -A15 -n '^function clearBookingSourceAppointment_' verify-src/Bookings.gs > /tmp/live-clear-function.txt
          grep -q "'Booking ID': ''" /tmp/live-clear-function.txt
          test "$(grep -c "'Calendar Event ID': ''" /tmp/live-clear-function.txt)" -eq 2

          cat > diagnostics/latest-test-uat03-source-link-clear-fix.txt <<EOF
          TEST UAT-03 source-link clear fix
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          live_source_patch=success
          live_pullback_verification=success
          intake_booking_id_clear=present
          intake_calendar_event_id_clear=present
          lead_booking_id_clear=present
          lead_calendar_event_id_clear=present
          deployment_changed=no
          script_properties_changed=no
          spreadsheet_changed=no
          calendar_changed=no
          production_touched=no
          EOF

      - name: Publish sanitized result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat03-source-link-clear-fix.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-03 source-link clear fix" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-03 source-link clear fix" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
