name: Inspect TEST UAT-04 Current Notes Migration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/inspect-test-uat04-current-notes-migration.trigger'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull live TEST source and inspect current migration
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -Eeuo pipefail
          REPORT="diagnostics/latest-test-uat04-current-notes-migration.txt"
          STAGE="initialize"
          mkdir -p "$HOME" diagnostics src
          trap 'rc=$?; if [ "$rc" -ne 0 ]; then printf "TEST UAT-04 current Notes migration inspection\nstatus=FAILED\nfailed_stage=%s\nexit_code=%s\nwrite_operations_performed=no\nproduction_touched=no\n" "$STAGE" "$rc" > "$REPORT"; fi' EXIT

          STAGE="write_credentials"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {"scriptId":"1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO","rootDir":"src","scriptExtensions":[".gs",".js"],"htmlExtensions":[".html"]}
          JSON

          STAGE="install_clasp"
          npm install --global @google/clasp >/dev/null 2>&1

          STAGE="pull_live_source"
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/UAT04Manual.gs

          STAGE="extract_function"
          node <<'NODE'
          const fs = require('fs');
          const text = fs.readFileSync('src/UAT04Manual.gs', 'utf8');
          const marker = 'function applyPhase6Uat04NotesSchemaFix()';
          const start = text.indexOf(marker);
          if (start < 0) throw new Error('Migration function not found.');
          const open = text.indexOf('{', start);
          let depth = 0, single = false, double = false, template = false, escape = false;
          let end = -1;
          for (let i = open; i < text.length; i += 1) {
            const c = text[i];
            if (escape) escape = false;
            else if (c === '\\') escape = true;
            else if (!double && !template && c === "'") single = !single;
            else if (!single && !template && c === '"') double = !double;
            else if (!single && !double && c === '`') template = !template;
            else if (!single && !double && !template) {
              if (c === '{') depth += 1;
              else if (c === '}') {
                depth -= 1;
                if (depth === 0) { end = i + 1; break; }
              }
            }
          }
          if (end < 0) throw new Error('Migration function close brace not found.');
          const fn = text.slice(start, end);
          const usesAppend = fn.includes('appendMissingHeaders_(resolved.sheet, definition.headers, 1)');
          const exposesAppended = fn.includes('appendedHeaders: appendedHeaders');
          const onlyExistenceCall = fn.includes('  ensureSheetForDefinition_(spreadsheet, definition);');
          const out = [
            'TEST UAT-04 current Notes migration inspection',
            'status=SUCCESS',
            'write_operations_performed=no',
            'production_touched=no',
            `uses_append_missing_headers=${usesAppend}`,
            `exposes_appended_headers=${exposesAppended}`,
            `contains_obsolete_standalone_existence_call=${onlyExistenceCall}`,
            '',
            fn,
            ''
          ].join('\n');
          fs.writeFileSync('diagnostics/latest-test-uat04-current-notes-migration.txt', out);
          NODE

          STAGE="verify_report"
          test -s "$REPORT"
          grep -q '^status=SUCCESS$' "$REPORT"
          STAGE="complete"

      - name: Publish sanitized diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat04-current-notes-migration.txt"
          if [ ! -s "$REPORT" ]; then
            printf "TEST UAT-04 current Notes migration inspection\nstatus=FAILED\nfailed_stage=report_missing\nwrite_operations_performed=no\nproduction_touched=no\n" > "$REPORT"
          fi
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-04 current Notes migration inspection" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-04 current Notes migration inspection" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
