name: Diagnose TEST CLASPRC_JSON Authentication

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/diagnose-test-b64-auth.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diagnose JSON credential safely
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set +e
          mkdir -p diagnostics "$HOME"
          REPORT="diagnostics/latest-test-b64-auth.txt"
          : > "$REPORT"
          echo "TEST CLASPRC_JSON authentication diagnostic" >> "$REPORT"
          echo "commit=${GITHUB_SHA}" >> "$REPORT"
          echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"

          if [ -n "${CLASPRC_JSON:-}" ]; then
            echo "CLASPRC_JSON_present=yes" >> "$REPORT"
            echo "CLASPRC_JSON_length=${#CLASPRC_JSON}" >> "$REPORT"
          else
            echo "CLASPRC_JSON_present=no" >> "$REPORT"
            echo "diagnostic_complete=yes" >> "$REPORT"
            exit 0
          fi

          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"

          node <<'NODE' >/tmp/jsoncheck.log 2>&1
          const fs = require('fs');
          const text = fs.readFileSync(process.env.HOME + '/.clasprc.json', 'utf8');
          console.log('starts_with_brace=' + (text.trimStart().startsWith('{') ? 'yes' : 'no'));
          try {
            const parsed = JSON.parse(text);
            console.log('json_parse_ok=yes');
            console.log('top_level_type=' + (Array.isArray(parsed) ? 'array' : typeof parsed));
            console.log('top_level_key_count=' + (parsed && typeof parsed === 'object' ? Object.keys(parsed).length : 0));
          } catch (e) {
            console.log('json_parse_ok=no');
            console.log('json_parse_error=' + String(e.message || e).replace(/[\r\n]+/g, ' '));
          }
          NODE
          cat /tmp/jsoncheck.log >> "$REPORT"

          npm install --global @google/clasp >/tmp/npm-install.log 2>&1
          echo "npm_install_clasp_exit=$?" >> "$REPORT"
          clasp --version >/tmp/clasp-version.log 2>&1
          echo "clasp_version_exit=$?" >> "$REPORT"
          if [ -s /tmp/clasp-version.log ]; then
            printf 'clasp_version=' >> "$REPORT"
            tr '\n' ' ' < /tmp/clasp-version.log >> "$REPORT"
            echo >> "$REPORT"
          fi

          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON

          rm -rf src
          mkdir -p src
          clasp pull >/tmp/clasp-pull.log 2>&1
          PULL_CODE=$?
          echo "clasp_pull_exit=$PULL_CODE" >> "$REPORT"
          if [ $PULL_CODE -ne 0 ]; then
            echo "clasp_pull_error:" >> "$REPORT"
            tail -30 /tmp/clasp-pull.log \
              | sed -E 's/(token|secret|password|refresh_token|access_token)[^ ]*/[REDACTED]/Ig' \
              | sed -E 's/[A-Za-z0-9_\.-]{80,}/[LONG_VALUE_REDACTED]/g' >> "$REPORT"
          else
            echo "pulled_appsscript_json=$([ -f src/appsscript.json ] && echo yes || echo no)" >> "$REPORT"
          fi
          echo "diagnostic_complete=yes" >> "$REPORT"

      - name: Publish sanitized diagnostic via GitHub API
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-b64-auth.txt"
          test -f "$REPORT"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-b64-auth.txt?ref=main" \
            | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST CLASPRC_JSON authentication diagnostic" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch "main" '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST CLASPRC_JSON authentication diagnostic" --arg content "$CONTENT_B64" --arg branch "main" '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-b64-auth.txt" \
            -d @/tmp/payload.json >/dev/null
