name: Fix TEST UAT-03 Source Link Clear V2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/fix-test-uat03-source-link-clear-v2.trigger'

permissions:
  contents: write

concurrency:
  group: avodah-test-uat
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull, patch, push, and verify live TEST source
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/Bookings.gs

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/Bookings.gs')
          text = path.read_text(encoding='utf-8')

          old_intake = """    updateObjectRow_('Intake Submissions', intake.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Last Processed At': new Date()
    });"""
          new_intake = """    updateObjectRow_('Intake Submissions', intake.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Booking ID': '',
      'Calendar Event ID': '',
      'Last Processed At': new Date()
    });"""

          old_lead = """    updateObjectRow_('Lead Database', lead.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Updated At': new Date(),
      'Updated By': bookingActorEmail_()
    });"""
          new_lead = """    updateObjectRow_('Lead Database', lead.rowNumber, {
      'Follow-up Status': 'New',
      'Appointment Date': '',
      'Booking ID': '',
      'Calendar Event ID': '',
      'Updated At': new Date(),
      'Updated By': bookingActorEmail_()
    });"""

          changed = False
          if new_intake not in text:
              if old_intake not in text:
                  raise SystemExit('Expected Intake cleanup block not found; refusing to patch.')
              text = text.replace(old_intake, new_intake, 1)
              changed = True
          if new_lead not in text:
              if old_lead not in text:
                  raise SystemExit('Expected Lead cleanup block not found; refusing to patch.')
              text = text.replace(old_lead, new_lead, 1)
              changed = True

          path.write_text(text, encoding='utf-8')
          Path('/tmp/patch-state.txt').write_text('changed' if changed else 'already_patched')

          def extract_function(source, name):
              m = re.search(r'function\s+' + re.escape(name) + r'\s*\([^)]*\)\s*\{', source)
              if not m:
                  raise SystemExit('Target function not found.')
              start = m.start()
              i = m.end() - 1
              depth = 0
              in_s = in_d = in_t = False
              esc = False
              while i < len(source):
                  c = source[i]
                  if esc:
                      esc = False
                  elif c == '\\':
                      esc = True
                  elif not in_d and not in_t and c == "'":
                      in_s = not in_s
                  elif not in_s and not in_t and c == '"':
                      in_d = not in_d
                  elif not in_s and not in_d and c == '`':
                      in_t = not in_t
                  elif not in_s and not in_d and not in_t:
                      if c == '{':
                          depth += 1
                      elif c == '}':
                          depth -= 1
                          if depth == 0:
                              return source[start:i+1]
                  i += 1
              raise SystemExit('Target function is unterminated.')

          body = extract_function(text, 'clearBookingSourceAppointment_')
          if body.count("'Booking ID': ''") != 2:
              raise SystemExit('Expected two Booking ID clear statements in target function.')
          if body.count("'Calendar Event ID': ''") != 2:
              raise SystemExit('Expected two Calendar Event ID clear statements in target function.')
          PY

          for f in src/*.gs; do node --check < "$f"; done
          clasp push --force >/dev/null

          rm -rf verify-src && mkdir -p verify-src
          python - <<'PY'
          import json
          data=json.load(open('.clasp.json'))
          data['rootDir']='verify-src'
          open('.clasp.json','w').write(json.dumps(data))
          PY
          clasp pull >/dev/null

          python - <<'PY'
          from pathlib import Path
          import re

          text = Path('verify-src/Bookings.gs').read_text(encoding='utf-8')
          m = re.search(r'function\s+clearBookingSourceAppointment_\s*\([^)]*\)\s*\{', text)
          if not m:
              raise SystemExit('Pulled-back target function not found.')
          start = m.start(); i = m.end()-1; depth = 0
          in_s = in_d = in_t = False; esc = False; body = None
          while i < len(text):
              c = text[i]
              if esc: esc = False
              elif c == '\\': esc = True
              elif not in_d and not in_t and c == "'": in_s = not in_s
              elif not in_s and not in_t and c == '"': in_d = not in_d
              elif not in_s and not in_d and c == '`': in_t = not in_t
              elif not in_s and not in_d and not in_t:
                  if c == '{': depth += 1
                  elif c == '}':
                      depth -= 1
                      if depth == 0:
                          body = text[start:i+1]
                          break
              i += 1
          if body is None:
              raise SystemExit('Pulled-back target function is unterminated.')
          if body.count("'Booking ID': ''") != 2:
              raise SystemExit('Pulled-back function lacks two Booking ID clears.')
          if body.count("'Calendar Event ID': ''") != 2:
              raise SystemExit('Pulled-back function lacks two Calendar Event ID clears.')
          PY

          PATCH_STATE="$(cat /tmp/patch-state.txt)"
          cat > diagnostics/latest-test-uat03-source-link-clear-fix-v2.txt <<EOF
          TEST UAT-03 source-link clear fix V2
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          patch_state=${PATCH_STATE}
          live_source_push=success
          live_pullback_verification=success
          intake_booking_id_clear=present
          intake_calendar_event_id_clear=present
          lead_booking_id_clear=present
          lead_calendar_event_id_clear=present
          deployment_changed=no
          script_properties_changed=no
          spreadsheet_changed=no
          calendar_changed=no
          production_touched=no
          EOF

      - name: Publish sanitized result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat03-source-link-clear-fix-v2.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-03 source-link clear fix V2" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-03 source-link clear fix V2" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
