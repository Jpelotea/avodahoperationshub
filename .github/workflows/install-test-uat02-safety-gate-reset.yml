name: Install TEST UAT-02 Safety Gate Reset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/install-test-uat02-safety-gate-reset.trigger'

permissions:
  contents: write

concurrency:
  group: avodah-test-uat
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull live TEST source and append safety reset function
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/UAT02Manual.gs

          if ! grep -q '^function resetPhase6Uat02SafetyGates[[:space:]]*(' src/UAT02Manual.gs; then
            cat >> src/UAT02Manual.gs <<'GS'

          /**
           * TEST-only safety reset for Phase 6 UAT-02.
           * Sets only the three gates relevant to the controlled Intake -> Lead UAT to FALSE.
           */
          function resetPhase6Uat02SafetyGates() {
            var environment = getEnvironment_();
            if (environment !== 'TEST') {
              throw avodahError_('UAT02_TEST_ONLY', 'Safety gate reset may run only in TEST.');
            }
            var spreadsheet = getHubSpreadsheet_();
            if (spreadsheet.getId() !== '1f8rZ8hVxMnrrFwnfezMhG1CklxDizdtC2IRvEnbC13s' ||
                !/^TEST(?:\s|-)/i.test(spreadsheet.getName())) {
              throw avodahError_('UAT02_SPREADSHEET_MISMATCH',
                'Safety gate reset is bound to the approved TEST spreadsheet only.');
            }

            var props = PropertiesService.getScriptProperties();
            function read_(name) {
              return String(props.getProperty(name) || '').trim().toUpperCase() === 'TRUE';
            }

            var before = {
              PUBLIC_PORTAL_ENABLED: read_('PUBLIC_PORTAL_ENABLED'),
              ENABLE_BOOKING_WORKFLOW: read_('ENABLE_BOOKING_WORKFLOW'),
              ENABLE_CALENDAR_WRITES: read_('ENABLE_CALENDAR_WRITES')
            };

            props.setProperties({
              PUBLIC_PORTAL_ENABLED: 'FALSE',
              ENABLE_BOOKING_WORKFLOW: 'FALSE',
              ENABLE_CALENDAR_WRITES: 'FALSE'
            }, false);

            var after = {
              PUBLIC_PORTAL_ENABLED: read_('PUBLIC_PORTAL_ENABLED'),
              ENABLE_BOOKING_WORKFLOW: read_('ENABLE_BOOKING_WORKFLOW'),
              ENABLE_CALENDAR_WRITES: read_('ENABLE_CALENDAR_WRITES')
            };

            if (after.PUBLIC_PORTAL_ENABLED || after.ENABLE_BOOKING_WORKFLOW ||
                after.ENABLE_CALENDAR_WRITES) {
              throw avodahError_('UAT02_GATE_RESET_FAILED',
                'One or more UAT-02 safety gates could not be restored to FALSE.');
            }

            var result = {
              ok: true,
              code: 'UAT02_SAFETY_GATES_FALSE',
              before: before,
              after: after
            };
            console.log(JSON.stringify(result));
            return result;
          }
          GS
          fi

          for f in src/*.gs; do node --check < "$f"; done
          clasp push --force >/dev/null

          cat > diagnostics/latest-test-uat02-safety-gate-reset-install.txt <<EOF
          TEST UAT-02 safety gate reset install
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          function=resetPhase6Uat02SafetyGates
          live_source_push=success
          deployment_changed=no
          script_properties_changed=no
          spreadsheet_changed=no
          calendar_changed=no
          production_touched=no
          EOF

      - name: Publish sanitized install result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat02-safety-gate-reset-install.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-02 safety gate reset install" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch "main" '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-02 safety gate reset install" --arg content "$CONTENT_B64" --arg branch "main" '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
