name: Inspect TEST UAT-04 Schema Helper Contract

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/inspect-test-uat04-schema-helper-contract.trigger'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull live TEST source and inspect schema helper contract
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -Eeuo pipefail
          REPORT="diagnostics/latest-test-uat04-schema-helper-contract.txt"
          STAGE="initialize"
          mkdir -p "$HOME" diagnostics src
          trap 'rc=$?; if [ "$rc" -ne 0 ]; then printf "TEST UAT-04 schema helper contract inspection\nstatus=FAILED\nfailed_stage=%s\nexit_code=%s\nwrite_operations_performed=no\nproduction_touched=no\n" "$STAGE" "$rc" > "$REPORT"; fi' EXIT

          STAGE="write_credentials"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {"scriptId":"1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO","rootDir":"src","scriptExtensions":[".gs",".js"],"htmlExtensions":[".html"]}
          JSON

          STAGE="install_clasp"
          npm install --global @google/clasp >/dev/null 2>&1

          STAGE="pull_live_source"
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/Database.gs
          test -f src/Config.gs
          test -f src/UAT04Manual.gs

          STAGE="extract_functions"
          node <<'NODE'
          const fs = require('fs');

          function extractFunction(text, name) {
            const re = new RegExp('function\\s+' + name.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&') + '\\s*\\([^)]*\\)\\s*\\{');
            const m = re.exec(text);
            if (!m) return `FUNCTION NOT FOUND: ${name}`;
            const start = m.index;
            const open = text.indexOf('{', start);
            let depth = 0, s = false, d = false, t = false, esc = false;
            for (let i = open; i < text.length; i += 1) {
              const c = text[i];
              if (esc) esc = false;
              else if (c === '\\') esc = true;
              else if (!d && !t && c === "'") s = !s;
              else if (!s && !t && c === '"') d = !d;
              else if (!s && !d && c === '`') t = !t;
              else if (!s && !d && !t) {
                if (c === '{') depth += 1;
                else if (c === '}') {
                  depth -= 1;
                  if (depth === 0) return text.slice(start, i + 1);
                }
              }
            }
            return text.slice(start, Math.min(text.length, start + 10000));
          }

          const database = fs.readFileSync('src/Database.gs', 'utf8');
          const config = fs.readFileSync('src/Config.gs', 'utf8');
          const runner = fs.readFileSync('src/UAT04Manual.gs', 'utf8');
          const names = [
            'ensureSheetForDefinition_',
            'ensureColumnCapacity_',
            'appendMissingHeaders_',
            'normalizeSheetHeaders_',
            'getTableContext_',
            'getSheetDefinition_'
          ];
          const out = [
            'TEST UAT-04 schema helper contract inspection',
            'status=SUCCESS',
            'write_operations_performed=no',
            'production_touched=no',
            ''
          ];
          names.forEach(name => {
            let source = database;
            if (name === 'getSheetDefinition_') source = config + '\n' + database;
            out.push('## ' + name);
            out.push(extractFunction(source, name));
            out.push('');
          });
          out.push('## applyPhase6Uat04NotesSchemaFix');
          out.push(extractFunction(runner, 'applyPhase6Uat04NotesSchemaFix'));
          out.push('');
          let content = out.join('\n').replace(/[A-Za-z0-9_-]{40,}/g, '[REDACTED_LONG_TOKEN]');
          if (Buffer.byteLength(content, 'utf8') > 300000) {
            content = content.slice(0, 300000) + '\n[TRUNCATED]\n';
          }
          fs.writeFileSync('diagnostics/latest-test-uat04-schema-helper-contract.txt', content);
          NODE

          STAGE="verify_report"
          test -s "$REPORT"
          grep -q '^status=SUCCESS$' "$REPORT"
          STAGE="complete"

      - name: Publish sanitized diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat04-schema-helper-contract.txt"
          if [ ! -s "$REPORT" ]; then
            printf "TEST UAT-04 schema helper contract inspection\nstatus=FAILED\nfailed_stage=report_missing\nwrite_operations_performed=no\nproduction_touched=no\n" > "$REPORT"
          fi
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-04 schema helper contract inspection" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-04 schema helper contract inspection" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
