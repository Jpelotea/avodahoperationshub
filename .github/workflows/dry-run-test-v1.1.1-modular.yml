name: Dry Run TEST v1.1.1 Modular Hardening

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/dry-run-test-v1.1.1-modular.trigger'

permissions:
  contents: write

jobs:
  dry_run:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Configure TEST Apps Script authentication
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          test -n "${CLASPRC_JSON:-}"
          mkdir -p "$HOME"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          node -e 'JSON.parse(require("fs").readFileSync(process.env.HOME + "/.clasprc.json", "utf8"));'
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON

      - name: Pull current TEST source
        run: |
          set -euo pipefail
          rm -rf src
          mkdir -p src
          clasp pull
          test -f src/appsscript.json
          test -f src/Calendar.gs
          test -f src/WebApp.gs
          test -f src/Bookings.gs
          test -f src/FoundationTests.gs

      - name: Apply modular hardening in runner only
        run: node scripts/harden-v1.1.1-modular.js

      - name: Verify modular hardened source
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R -n "Manage appointment:.*managementUrl" src/Calendar.gs
          ! grep -R -n "details.managementUrl" src/Calendar.gs
          grep -q "Management Token Hash.*''" src/Bookings.gs
          grep -q "publicManagedBookingResult_" src/WebApp.gs
          node --check scripts/harden-v1.1.1-modular.js
          for f in src/*.gs; do node --check < "$f"; done

      - name: Publish dry-run result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          REPORT="diagnostics/latest-test-v1.1.1-modular-dry-run.txt"
          cat > "$REPORT" <<EOF
          TEST v1.1.1 modular hardening dry run
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          job_status=${JOB_STATUS}
          push_performed=no
          redeploy_performed=no
          EOF
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-v1.1.1-modular-dry-run.txt?ref=main" \
            | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST v1.1.1 modular dry-run result" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch "main" '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST v1.1.1 modular dry-run result" --arg content "$CONTENT_B64" --arg branch "main" '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-v1.1.1-modular-dry-run.txt" \
            -d @/tmp/payload.json >/dev/null
