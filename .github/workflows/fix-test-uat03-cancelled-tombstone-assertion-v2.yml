name: Fix TEST UAT-03 Cancelled Tombstone Assertion V2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/fix-test-uat03-cancelled-tombstone-assertion-v2.trigger'

permissions:
  contents: write

concurrency:
  group: avodah-test-uat
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Patch and verify live TEST UAT runner
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {"scriptId":"1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO","rootDir":"src","scriptExtensions":[".gs",".js"],"htmlExtensions":[".html"]}
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null
          test -f src/UAT03Manual.gs
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/UAT03Manual.gs';
          let text = fs.readFileSync(path, 'utf8');
          const newMarker = "var cancelledCalendarEvent = readBookingCalendarEvent_(config, eventId);";
          let state = 'already_patched';
          if (!text.includes(newMarker)) {
            const pattern = /([ \t]*)assert_\(!readBookingCalendarEvent_\(config, eventId\),\s*\n\1  'UAT03_CANCEL_CALENDAR_EVENT_REMAINS',\s*\n\1  'Cancelled TEST Calendar event still resolves as active\.'\);/;
            const match = text.match(pattern);
            if (!match) throw new Error('Live UAT-03 cancellation assertion block not found.');
            const i = match[1];
            const replacement = i + "var cancelledCalendarEvent = readBookingCalendarEvent_(config, eventId);\n" +
              i + "assert_(!cancelledCalendarEvent ||\n" +
              i + "  String(cancelledCalendarEvent.status || '').toLowerCase() === 'cancelled',\n" +
              i + "  'UAT03_CANCEL_CALENDAR_EVENT_REMAINS',\n" +
              i + "  'Cancelled TEST Calendar event still resolves with a non-cancelled status.');";
            text = text.replace(pattern, replacement);
            state = 'changed';
          }
          if ((text.match(/var cancelledCalendarEvent = readBookingCalendarEvent_\(config, eventId\);/g) || []).length !== 1) {
            throw new Error('Cancelled tombstone assertion count mismatch.');
          }
          if (!text.includes("String(cancelledCalendarEvent.status || '').toLowerCase() === 'cancelled'")) {
            throw new Error('Cancelled tombstone status check is missing.');
          }
          if (text.includes("assert_(!readBookingCalendarEvent_(config, eventId)")) {
            throw new Error('Obsolete cancellation assertion remains.');
          }
          fs.writeFileSync(path, text);
          fs.writeFileSync('/tmp/patch-state.txt', state);
          NODE
          for f in src/*.gs; do node --check < "$f"; done
          clasp push --force >/dev/null
          rm -rf verify-src && mkdir -p verify-src
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('.clasp.json','utf8'));j.rootDir='verify-src';fs.writeFileSync('.clasp.json',JSON.stringify(j));"
          clasp pull >/dev/null
          node <<'NODE'
          const fs = require('fs');
          const text = fs.readFileSync('verify-src/UAT03Manual.gs', 'utf8');
          if ((text.match(/var cancelledCalendarEvent = readBookingCalendarEvent_\(config, eventId\);/g) || []).length !== 1) {
            throw new Error('Pulled-back cancelled tombstone assertion count mismatch.');
          }
          if (!text.includes("String(cancelledCalendarEvent.status || '').toLowerCase() === 'cancelled'")) {
            throw new Error('Pulled-back cancelled tombstone status check is missing.');
          }
          if (text.includes("assert_(!readBookingCalendarEvent_(config, eventId)")) {
            throw new Error('Pulled-back obsolete cancellation assertion remains.');
          }
          NODE
          PATCH_STATE="$(cat /tmp/patch-state.txt)"
          cat > diagnostics/latest-test-uat03-cancelled-tombstone-assertion-fix-v2.txt <<EOF
          TEST UAT-03 cancelled tombstone assertion fix V2
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          patch_state=${PATCH_STATE}
          live_source_push=success
          live_pullback_verification=success
          absent_event_accepted=yes
          cancelled_tombstone_accepted=yes
          non_cancelled_event_rejected=yes
          deployment_changed=no
          product_source_changed=no
          script_properties_changed=no
          spreadsheet_changed=no
          calendar_changed=no
          production_touched=no
          EOF

      - name: Publish sanitized result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat03-cancelled-tombstone-assertion-fix-v2.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-03 cancelled tombstone assertion fix V2" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-03 cancelled tombstone assertion fix V2" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
