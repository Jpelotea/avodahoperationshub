name: Inspect TEST UAT-04 Project 1 Contract

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/inspect-test-uat04-project1-contract.trigger'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull live TEST source and inspect Project 1 contracts
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {"scriptId":"1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO","rootDir":"src","scriptExtensions":[".gs",".js"],"htmlExtensions":[".html"]}
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const files = fs.readdirSync('src').filter(f => /\.(gs|js)$/.test(f));
          const terms = [
            /project\s*1/i,
            /project1/i,
            /ENABLE_PROJECT1_WRITES/,
            /Activity Database/,
            /Activity Audit Log/,
            /Week 1|Week 2|Week 3|Week 4|Monthly Summary/i,
            /points?/i,
            /sub[-_ ]?activity/i,
            /submit.*activity/i,
            /activity.*submit/i
          ];

          function functionBody(source, name) {
            const start = source.search(new RegExp('function\\s+' + name + '\\s*\\([^)]*\\)\\s*\\{'));
            if (start < 0) return null;
            const open = source.indexOf('{', start);
            let depth = 0, s = false, d = false, t = false, esc = false;
            for (let i = open; i < source.length; i++) {
              const c = source[i];
              if (esc) esc = false;
              else if (c === '\\') esc = true;
              else if (!d && !t && c === "'") s = !s;
              else if (!s && !t && c === '"') d = !d;
              else if (!s && !d && c === '`') t = !t;
              else if (!s && !d && !t) {
                if (c === '{') depth++;
                else if (c === '}' && --depth === 0) return source.slice(start, i + 1);
              }
            }
            return null;
          }

          const discovered = [];
          const snippets = [];
          for (const file of files) {
            const text = fs.readFileSync(path.join('src', file), 'utf8');
            const lines = text.split(/\r?\n/);
            for (let i = 0; i < lines.length; i++) {
              if (terms.some(r => r.test(lines[i]))) {
                snippets.push(`${file}:${i + 1}: ${lines[i].trim()}`);
              }
            }
            const re = /function\s+([A-Za-z0-9_]+)\s*\(/g;
            let m;
            while ((m = re.exec(text))) {
              const name = m[1];
              const body = functionBody(text, name) || '';
              if (terms.some(r => r.test(name) || r.test(body))) {
                discovered.push({file, name, body});
              }
            }
          }

          const out = [
            'TEST UAT-04 Project 1 contract inspection',
            'write_operations_performed=no',
            'production_touched=no',
            '',
            '## Discovered functions'
          ];
          for (const item of discovered) {
            out.push(`### ${item.file} :: ${item.name}`);
            out.push(item.body.replace(/[A-Za-z0-9_-]{40,}/g, '[REDACTED_LONG_TOKEN]'));
            out.push('');
          }
          out.push('## Targeted source lines');
          out.push(...snippets.slice(0, 600));
          out.push('');
          fs.writeFileSync('diagnostics/latest-test-uat04-project1-contract.txt', out.join('\n'));
          NODE

      - name: Publish sanitized diagnostic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat04-project1-contract.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-04 Project 1 contract inspection" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-04 Project 1 contract inspection" --arg content "$CONTENT_B64" --arg branch main '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
