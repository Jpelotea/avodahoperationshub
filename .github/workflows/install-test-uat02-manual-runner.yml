name: Install TEST UAT-02 Manual Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/install-test-uat02-manual-runner.trigger'

permissions:
  contents: write

concurrency:
  group: avodah-test-uat
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull TEST source and install manual UAT runner
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME" diagnostics src
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null

          cat > src/UAT02Manual.gs <<'GS'
          /**
           * Phase 6 UAT-02 manual TEST-only runtime runner.
           * Not deployed to the public web app. Run once from the Apps Script editor.
           */
          function runPhase6Uat02Manual() {
            var props = PropertiesService.getScriptProperties();
            var environment = getEnvironment_();
            if (environment !== 'TEST') {
              throw avodahError_('UAT02_TEST_ONLY', 'UAT-02 may run only in TEST.');
            }

            var spreadsheet = getHubSpreadsheet_();
            if (spreadsheet.getId() !== '1f8rZ8hVxMnrrFwnfezMhG1CklxDizdtC2IRvEnbC13s' ||
                !/^TEST(?:\s|-)/i.test(spreadsheet.getName())) {
              throw avodahError_('UAT02_SPREADSHEET_MISMATCH',
                'UAT-02 is bound to the approved TEST spreadsheet only.');
            }

            function gate_(name) {
              return String(props.getProperty(name) || '').trim().toUpperCase() === 'TRUE';
            }

            if (gate_('PUBLIC_PORTAL_ENABLED')) {
              throw avodahError_('UAT02_PORTAL_NOT_BASELINE_FALSE',
                'PUBLIC_PORTAL_ENABLED must be FALSE before UAT-02 starts.');
            }
            if (gate_('ENABLE_BOOKING_WORKFLOW') || gate_('ENABLE_CALENDAR_WRITES')) {
              throw avodahError_('UAT02_UNSAFE_GATE_STATE',
                'Booking and Calendar write gates must remain FALSE for UAT-02.');
            }

            var submissionId = '9c3e1a7b-4f62-4b2d-8c15-6e7a9f0d2b31';
            var email = 'uat02.manual.20260723@example.com';
            var phone = '+639171234568';
            var existing = findRowsByHeaderValue_('Intake Submissions',
              'Submission ID', submissionId);
            if (existing.length) {
              throw avodahError_('UAT02_ALREADY_EXECUTED',
                'The controlled UAT-02 fixture already exists. Do not run this test twice.');
            }

            var payload = {
              submission_id: submissionId,
              full_name: 'UAT 02 Manual Runtime Test',
              email: email,
              mobile_number: phone,
              location: 'Butuan City',
              primary_need: 'Phase 6 UAT-02 Intake to Lead lifecycle verification',
              preferred_contact_method: 'Email',
              preferred_schedule: 'UAT only - no booking requested',
              additional_notes: 'Controlled TEST fixture for Phase 6 UAT-02 manual runtime verification.',
              consultation_requested: false,
              consent: true,
              website: ''
            };

            var result;
            props.setProperty('PUBLIC_PORTAL_ENABLED', 'TRUE');
            try {
              var first = submitPublicIntake(payload);
              var second = submitPublicIntake(payload);

              var intakeRows = findRowsByHeaderValue_('Intake Submissions',
                'Submission ID', submissionId);
              if (intakeRows.length !== 1) {
                throw avodahError_('UAT02_INTAKE_COUNT',
                  'Expected exactly one Intake Submissions row.');
              }
              var intakeRecord = getObjectRow_('Intake Submissions', intakeRows[0]).record;
              var intakeId = String(intakeRecord['Intake ID'] || '').trim();
              var leadId = String(intakeRecord['Lead ID'] || '').trim();
              if (!intakeId || !leadId) {
                throw avodahError_('UAT02_LINK_MISSING', 'Intake ID or Lead ID is missing.');
              }

              var leadRows = findRowsByHeaderValue_('Lead Database', 'Lead ID', leadId);
              var leadEmailRows = findRowsByHeaderValue_('Lead Database',
                'Normalized Email', normalizeEmail_(email));
              if (leadRows.length !== 1 || leadEmailRows.length !== 1) {
                throw avodahError_('UAT02_LEAD_COUNT',
                  'Expected exactly one linked logical Lead Database row.');
              }
              var leadRecord = getObjectRow_('Lead Database', leadRows[0]).record;
              var expectedPhone = normalizePhone_(phone);
              var checks = {
                firstAccepted: first.code === 'PUBLIC_INTAKE_ACCEPTED' && first.idempotent === false,
                replayIdempotent: second.code === 'PUBLIC_INTAKE_REPLAY' && second.idempotent === true,
                sameIntake: String(first.intake_id || '') === String(second.intake_id || '') &&
                  String(first.intake_id || '') === intakeId,
                sameLead: String(first.lead_id || '') === String(second.lead_id || '') &&
                  String(first.lead_id || '') === leadId,
                intakeCountOne: intakeRows.length === 1,
                leadCountOne: leadRows.length === 1 && leadEmailRows.length === 1,
                processingComplete: String(intakeRecord['Processing Status'] || '').trim().toUpperCase() === 'PROCESSED',
                normalizedEmail: normalizeEmail_(intakeRecord['Normalized Email']) === normalizeEmail_(email),
                normalizedPhone: normalizePhone_(intakeRecord['Normalized Phone']) === expectedPhone,
                intakeFollowUpNew: String(intakeRecord['Follow-up Status'] || '').trim().toUpperCase() === 'NEW',
                leadFollowUpNew: String(leadRecord['Follow-up Status'] || '').trim().toUpperCase() === 'NEW',
                leadEmail: normalizeEmail_(leadRecord['Normalized Email']) === normalizeEmail_(email),
                leadPhone: normalizePhone_(leadRecord['Normalized Phone']) === expectedPhone,
                bookingGateFalse: !gate_('ENABLE_BOOKING_WORKFLOW'),
                calendarGateFalse: !gate_('ENABLE_CALENDAR_WRITES')
              };
              var failures = Object.keys(checks).filter(function(key) { return !checks[key]; });
              if (failures.length) {
                throw avodahError_('UAT02_ASSERTION_FAILED', failures.join(','));
              }

              result = {
                ok: true,
                code: 'UAT02_MANUAL_PASS',
                submissionId: submissionId,
                intakeId: intakeId,
                leadId: leadId,
                firstResult: first.code,
                replayResult: second.code,
                intakeRows: 1,
                leadRows: 1,
                normalizedEmail: true,
                normalizedPhone: true,
                intakeFollowUp: true,
                leadFollowUp: true
              };

              try {
                logAuditEvent_({
                  action: 'UAT02_MANUAL_RUNTIME_PASS',
                  entityType: 'INTAKE',
                  entityId: intakeId,
                  result: 'SUCCESS',
                  details: {
                    submissionId: submissionId,
                    leadId: leadId,
                    firstResult: first.code,
                    replayResult: second.code,
                    intakeRows: 1,
                    leadRows: 1
                  }
                });
              } catch (auditError) {
                console.warn('UAT-02 passed but audit evidence write failed: ' + auditError.message);
              }
              console.log(JSON.stringify(result));
              return result;
            } catch (error) {
              try {
                logAuditEvent_({
                  action: 'UAT02_MANUAL_RUNTIME_FAIL',
                  entityType: 'INTAKE',
                  entityId: submissionId,
                  result: 'FAILED',
                  details: {
                    submissionId: submissionId,
                    errorCode: error.code || error.name || 'ERROR',
                    errorMessage: error.message
                  }
                });
              } catch (ignored) {}
              throw error;
            } finally {
              props.setProperty('PUBLIC_PORTAL_ENABLED', 'FALSE');
              if (String(props.getProperty('PUBLIC_PORTAL_ENABLED') || '').trim().toUpperCase() === 'TRUE') {
                throw avodahError_('UAT02_GATE_CLEANUP_FAILED',
                  'PUBLIC_PORTAL_ENABLED could not be restored to FALSE.');
              }
            }
          }
          GS

          for f in src/*.gs; do node --check < "$f"; done
          clasp push --force >/dev/null

          cat > diagnostics/latest-test-uat02-manual-runner-install.txt <<EOF
          TEST UAT-02 manual runner install
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          runner_file=UAT02Manual.gs
          runner_function=runPhase6Uat02Manual
          live_source_push=success
          deployment_changed=no
          script_properties_changed=no
          spreadsheet_changed=no
          calendar_changed=no
          production_touched=no
          EOF

      - name: Publish sanitized install result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-uat02-manual-runner-install.txt"
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT?ref=main" | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST UAT-02 manual runner install" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch "main" '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST UAT-02 manual runner install" --arg content "$CONTENT_B64" --arg branch "main" '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/contents/$REPORT" -d @/tmp/payload.json >/dev/null
