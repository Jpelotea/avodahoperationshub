name: Diagnose TEST Runtime Entrypoints

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/diagnose-test-runtime-entrypoints.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull TEST source and inventory entrypoints
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics "$HOME"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"
          cat > .clasp.json <<'JSON'
          {
            "scriptId": "1zY0oLLW9_MtXdPvRmyBci2TMnBnCwM6bbjXIMnK9-sSs4iaSmX41oZYO",
            "rootDir": "src",
            "scriptExtensions": [".gs", ".js"],
            "htmlExtensions": [".html"]
          }
          JSON
          npm install --global @google/clasp >/dev/null 2>&1
          rm -rf src && mkdir -p src
          clasp pull >/dev/null

          EXEC_API="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('src/appsscript.json','utf8')); process.stdout.write(m.executionApi ? 'present' : 'absent');")"
          REPORT="diagnostics/latest-test-runtime-entrypoints.txt"
          {
            echo "TEST runtime entrypoint inventory"
            echo "commit=${GITHUB_SHA}"
            echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "manifest_execution_api=${EXEC_API}"
            echo "functions:"
            for f in FoundationTests.gs Calendar.gs Bookings.gs Config.gs Setup.gs Validation.gs Triggers.gs WebApp.gs Security.gs; do
              if [ -f "src/$f" ]; then
                grep -E '^function[[:space:]]+[A-Za-z0-9_]+[[:space:]]*\(' "src/$f" \
                  | sed -E "s/^function[[:space:]]+([A-Za-z0-9_]+).*/$f:\1/" \
                  || true
              fi
            done
          } > "$REPORT"

      - name: Publish sanitized entrypoint inventory
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPORT="diagnostics/latest-test-runtime-entrypoints.txt"
          if [ ! -f "$REPORT" ]; then
            mkdir -p diagnostics
            cat > "$REPORT" <<EOF
          TEST runtime entrypoint inventory
          commit=${GITHUB_SHA}
          utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          inventory_failed_before_report=yes
          EOF
          fi
          CONTENT_B64="$(base64 -w 0 "$REPORT")"
          CURRENT_SHA="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-runtime-entrypoints.txt?ref=main" \
            | jq -r '.sha // empty' || true)"
          if [ -n "$CURRENT_SHA" ]; then
            jq -n --arg message "Record TEST runtime entrypoint inventory" --arg content "$CONTENT_B64" --arg sha "$CURRENT_SHA" --arg branch "main" '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/payload.json
          else
            jq -n --arg message "Record TEST runtime entrypoint inventory" --arg content "$CONTENT_B64" --arg branch "main" '{message:$message,content:$content,branch:$branch}' > /tmp/payload.json
          fi
          curl -fsSL -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/contents/diagnostics/latest-test-runtime-entrypoints.txt" \
            -d @/tmp/payload.json >/dev/null
